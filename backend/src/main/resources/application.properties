spring.application.name=management-system

# ========================
# PostgreSQL Configuration
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/healthcare_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:tiger}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server
# ========================
server.port=${PORT:8082}

# ========================
# JWT Configuration
# ========================
jwt.secret=${JWT_SECRET:myLocalSecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.mobile.default-hospital-code=HOSP001

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

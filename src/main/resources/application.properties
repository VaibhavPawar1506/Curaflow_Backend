spring.application.name=management-system

# ========================
# PostgreSQL Configuration
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/healthcare_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:tiger}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

# ========================
# Server
# Render injects PORT for Web Services.
# ========================
server.port=${PORT:10000}

# ========================
# JWT Configuration
# JWT_SECRET must be a Base64-encoded key of at least 32 bytes.
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.mobile.default-hospital-code=${DEFAULT_HOSPITAL_CODE:HOSP001}

# ========================
# File Uploads
# Render filesystem is ephemeral unless you attach a disk.
# ========================
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/curaflow/prescriptions}

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
